<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Travel Workspace v14</title>
<style>
  :root{
    --bg:#f4f6fa; --panel:#fff; --line:#e5e7eb; --text:#111827; --muted:#6b7280;
    --blue:#2563eb; --blue-soft:#dbeafe; --red:#e11d48; --shadow:0 10px 28px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
  .layout{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
  .sidebar{background:#f8fafc;border-right:1px solid var(--line);padding:20px}
  .main{padding:26px 30px 40px;background:#fff}
  .brand{font-size:22px;font-weight:900;margin-bottom:6px}
  .hint{font-size:12px;color:var(--muted)}
  .panel,.card,.kpi,.item{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
  .panel{padding:14px;margin-bottom:16px}
  .card{padding:16px}
  .section{margin-bottom:18px}
  .section h3{margin:0 0 10px;font-size:17px}
  .stack{display:grid;gap:8px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  input,select,textarea,button{
    width:100%;min-width:0;border-radius:12px;border:1px solid var(--line);
    padding:11px 12px;background:#fff;color:var(--text);font:inherit;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.08)}
  button{border:none;background:var(--blue);color:#fff;font-weight:800;cursor:pointer}
  .ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
  .soft{background:var(--blue-soft);color:#1d4ed8}
  .small{width:auto;padding:7px 10px;border-radius:10px;font-size:12px}
  .danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
  .trip-list,.list{display:grid;gap:10px}
  .trip-item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;cursor:pointer;background:#fff}
  .trip-item.active{background:#eff6ff;border-color:#bfdbfe}
  .trip-meta,.meta{font-size:12px;color:var(--muted)}
  .main-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:20px}
  .main-head h1{margin:0 0 6px;font-size:30px}
  .head-actions{display:flex;gap:8px;flex-wrap:wrap}
  .head-actions button{width:auto}
  .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
  .kpi{padding:14px}
  .kpi .label{font-size:12px;color:var(--muted);margin-bottom:4px}
  .kpi .value{font-size:24px;font-weight:900}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tab{width:auto;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--text)}
  .tab.active{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .item{padding:14px}
  .item h4{margin:0 0 6px;font-size:15px}
  .mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
  .mini-actions button{width:auto}
  .timeline-dates{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .date-pill{width:auto;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-weight:800;color:var(--text)}
  .date-pill.active{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
  .autocomplete-wrap{position:relative}
  .suggestions{
    position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);max-height:240px;overflow:auto;display:none;z-index:20;
  }
  .suggestions.show{display:block}
  .suggestion{padding:10px 12px;cursor:pointer;border-bottom:1px solid #f3f4f6}
  .suggestion:last-child{border-bottom:none}
  .suggestion:hover{background:#f8fafc}
  .scroll-area{max-height:640px;overflow:auto}
  .check-card{display:grid;grid-template-columns:22px 1fr auto;gap:12px;align-items:flex-start;padding:14px 16px;border:1px solid var(--line);border-radius:16px;background:#fff}
  .check-card input[type="checkbox"]{width:18px;height:18px;margin-top:2px}
  .done{text-decoration:line-through;color:var(--muted)}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;background:#f3f4f6;color:#374151}
  @media (max-width:1180px){
    .layout{grid-template-columns:1fr}
    .sidebar{border-right:none;border-bottom:1px solid var(--line)}
    .content-grid,.kpis,.row2,.row3{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Travel Workspace <span style="font-size:12px;color:#2563eb;font-weight:800;vertical-align:middle;">Build v14</span></div>
    <div class="hint" style="margin-bottom:12px">구간 추가/타임라인을 새로 다시 만든 버전</div>

    <div class="panel">
      <label>새 여행 이름</label>
      <input id="newTripName" placeholder="예: 후쿠오카 5월">
      <div class="row2" style="margin-top:8px">
        <button onclick="createTrip()">여행 만들기</button>
        <button class="ghost" onclick="toggleArchiveView()">archive 보기</button>
      </div>
      <div class="trip-list" id="tripList" style="margin-top:10px"></div>
      <div class="hint" style="margin-top:10px">저장 위치: 이 브라우저 localStorage</div>
    </div>

    <div class="panel">
      <div class="section">
        <h3>기본 여행 정보</h3>
        <div class="stack">
          <input id="tripName" placeholder="여행 이름">
          <input id="companions" placeholder="같이 가는 사람">
          <div class="row2">
            <div class="autocomplete-wrap">
              <input id="tripCountry" placeholder="대표 나라" autocomplete="off">
              <div class="suggestions" id="tripCountrySuggestions"></div>
            </div>
            <div class="autocomplete-wrap">
              <input id="tripCity" placeholder="대표 도시 / 지역" autocomplete="off">
              <div class="suggestions" id="tripCitySuggestions"></div>
            </div>
          </div>
          <div class="row2">
            <input id="startDate" type="date">
            <input id="endDate" type="date">
          </div>
          <button class="soft" onclick="saveTripInfo()">기본 정보 저장</button>
        </div>
      </div>

      <div class="section">
        <h3>여행 구간 / 숙소</h3>
        <div class="hint" style="margin-bottom:8px">나라·도시·숙소가 바뀌는 일정은 여기서 추가합니다.</div>
        <div class="stack">
          <div class="row2">
            <input id="segmentStartDate" type="date">
            <input id="segmentEndDate" type="date">
          </div>
          <div class="row2">
            <div class="autocomplete-wrap">
              <input id="segmentCountry" placeholder="구간 나라" autocomplete="off">
              <div class="suggestions" id="segmentCountrySuggestions"></div>
            </div>
            <div class="autocomplete-wrap">
              <input id="segmentCity" placeholder="구간 도시 / 지역" autocomplete="off">
              <div class="suggestions" id="segmentCitySuggestions"></div>
            </div>
          </div>
          <input id="segmentStayName" placeholder="구간 숙소 이름">
          <input id="segmentStayAddress" placeholder="구간 숙소 주소 / 메모">
          <div class="row2">
            <button class="soft" onclick="addTravelSegment()">구간 추가</button>
            <button class="ghost" onclick="clearTravelSegmentInputs()">비우기</button>
          </div>
        </div>
        <div class="list" id="segmentList" style="margin-top:10px"></div>
      </div>

      <div class="section">
        <h3>체크리스트 / 예산</h3>
        <div class="row2">
          <button class="soft" onclick="quickLoadChecklist('japan')">일본 체크리스트</button>
          <button class="soft" onclick="quickLoadChecklist('basic')">기본 체크리스트</button>
        </div>
        <div class="stack" style="margin-top:8px">
          <input id="checkTitle" placeholder="체크리스트 직접 추가">
          <input id="checkDetail" placeholder="상세 내용">
          <button onclick="addChecklist()">체크리스트 추가</button>
          <div class="row2">
            <input id="budgetTotal" type="number" placeholder="총 예산">
            <select id="budgetCurrency"><option>KRW</option><option>JPY</option><option>USD</option><option>EUR</option></select>
          </div>
          <button class="soft" onclick="saveBudget()">예산 저장</button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-head">
      <div>
        <h1 id="currentTripTitle">선택된 여행 없음</h1>
        <div class="hint" id="currentTripMeta">왼쪽에서 여행을 선택해 주세요.</div>
      </div>
      <div class="head-actions">
        <button class="ghost" onclick="duplicateTrip()">복제</button>
        <button class="ghost" onclick="archiveCurrentTrip()">archive</button>
        <button class="ghost" onclick="deleteCurrentTrip()">삭제</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label">장소 수</div><div class="value" id="kpiPlaces">0</div></div>
      <div class="kpi"><div class="label">구간 수</div><div class="value" id="kpiSegments">0</div></div>
      <div class="kpi"><div class="label">체크리스트</div><div class="value" id="kpiChecklist">0</div></div>
      <div class="kpi"><div class="label">총 예산</div><div class="value" id="kpiBudget">0</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview', this)">개요</button>
      <button class="tab" onclick="switchTab('places', this)">장소</button>
      <button class="tab" onclick="switchTab('timeline', this)">일정</button>
      <button class="tab" onclick="switchTab('checklist', this)">체크리스트</button>
    </div>

    <section class="tab-panel active" id="panel-overview">
      <div class="card">
        <h3 style="margin-top:0">여행 기본 정보</h3>
        <div class="list" id="tripInfoCards"></div>
      </div>
    </section>

    <section class="tab-panel" id="panel-places">
      <div class="content-grid">
        <div class="card">
          <h3 style="margin-top:0">장소 추가</h3>
          <div class="stack">
            <div class="autocomplete-wrap">
              <input id="searchPlaceInput" placeholder="장소 검색 (예: 센소지)">
              <div class="suggestions" id="placeSuggestions"></div>
            </div>
            <div class="row3">
              <select id="placeCategory">
                <option>관광지</option><option>맛집</option><option>카페</option><option>쇼핑</option><option>포토스팟</option><option>숙소</option><option>기타</option>
              </select>
              <input id="placeCountry" placeholder="나라">
              <input id="placeCity" placeholder="도시 / 지역">
            </div>
            <input id="placeAddress" placeholder="주소 자동 채움">
            <input id="placeMemo" placeholder="메모">
            <div class="row2">
              <button onclick="addPlace()">장소 추가</button>
              <button class="ghost" onclick="clearPlaceInputs()">비우기</button>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-top:0">등록된 장소</h3>
          <div class="scroll-area">
            <div class="list" id="placeList"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-timeline">
      <div class="content-grid">
        <div class="card">
          <h3 style="margin-top:0">Trip Timeline</h3>
          <div id="dateTabs" class="timeline-dates"></div>
          <div class="hint" id="selectedDateLabel">여행 날짜나 구간 날짜를 설정하면 일정표가 나타납니다.</div>
          <div style="height:10px"></div>
          <div class="list" id="timelineSegmentBox"></div>
          <div style="height:10px"></div>
          <div class="list" id="datedPlaceList"></div>
        </div>

        <div class="card">
          <h3 style="margin-top:0">선택 날짜에 장소 배치</h3>
          <div class="stack">
            <select id="assignPlaceSelect"></select>
            <div class="row2">
              <select id="assignTime">
                <option>상관없음</option><option>아침</option><option>점심</option><option>오후</option><option>저녁</option><option>야간</option>
              </select>
              <input id="assignNote" placeholder="일정 메모">
            </div>
            <button onclick="assignPlaceToDate()">선택 날짜에 넣기</button>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="panel-checklist">
      <div class="card">
        <h3 style="margin-top:0">Checklist</h3>
        <div class="list" id="checkList"></div>
      </div>
    </section>
  </main>
</div>

<script>
const STORAGE_KEY='travelPlannerWorkspaceV14';

const countries=["일본","대한민국","대만","태국","베트남","싱가포르","말레이시아","인도네시아","인도","영국","프랑스","독일","이탈리아","스페인","포르투갈","네덜란드","벨기에","스위스","오스트리아","체코","헝가리","아이슬란드","아일랜드","호주","뉴질랜드","미국","캐나다","멕시코"];
const cityMap={
  "일본":["도쿄","오사카","교토","후쿠오카","삿포로","나고야","오키나와","고베","나라","요코하마"],
  "대한민국":["서울","부산","제주","강릉","경주","여수","전주"],
  "대만":["타이베이","타이중","가오슝","타이난"],
  "태국":["방콕","치앙마이","푸켓","파타야"],
  "베트남":["다낭","하노이","호치민","호이안","나트랑"],
  "영국":["런던","에든버러","맨체스터"],
  "이탈리아":["로마","피렌체","밀라노","베네치아","나폴리"],
  "미국":["뉴욕","로스앤젤레스","샌프란시스코","하와이","라스베이거스"]
};
const placeSeed=[
  {name:"시부야 스카이", city:"도쿄", country:"일본", address:"2 Chome-24-12 Shibuya, Tokyo", category:"포토스팟"},
  {name:"센소지", city:"도쿄", country:"일본", address:"2 Chome-3-1 Asakusa, Tokyo", category:"관광지"},
  {name:"도쿄타워", city:"도쿄", country:"일본", address:"4 Chome-2-8 Shibakoen, Tokyo", category:"관광지"},
  {name:"메이지 신궁", city:"도쿄", country:"일본", address:"1-1 Yoyogikamizonocho, Tokyo", category:"관광지"},
  {name:"츠키지 시장", city:"도쿄", country:"일본", address:"4 Chome-16-2 Tsukiji, Tokyo", category:"맛집"},
  {name:"긴자 식스", city:"도쿄", country:"일본", address:"6 Chome-10-1 Ginza, Tokyo", category:"쇼핑"},
  {name:"타이베이 101", city:"타이베이", country:"대만", address:"No. 7, Section 5, Xinyi Rd, Taipei", category:"관광지"},
  {name:"융캉제", city:"타이베이", country:"대만", address:"Yongkang Street, Taipei", category:"맛집"},
  {name:"중정기념당", city:"타이베이", country:"대만", address:"21 Zhongshan S Rd, Taipei", category:"관광지"}
];
const checklistTemplates={
  basic:[["여권","유효기간 확인"],["충전기","휴대폰/보조배터리"],["상비약","소화제, 진통제"],["세면도구","칫솔, 치약"]],
  japan:[["여권","유효기간 확인"],["Visit Japan 준비","필요 시 확인"],["엔화","현금 조금"],["유심/eSIM","개통 확인"]]
};

let db={trips:[],currentTripId:null,showArchive:false};
let selectedDate='';
let editingChecklistId=null;

function $(id){return document.getElementById(id);}
function uid(){return 'id'+Date.now()+Math.random().toString(16).slice(2);}
function money(n){return Number(n||0).toLocaleString('ko-KR');}
function esc(s){return String(s).replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}
function currentTrip(){return db.trips.find(t=>t.id===db.currentTripId)||null;}

function defaultTrip(name='새 여행'){
  return {
    id:uid(), archived:false,
    tripName:name, companions:'',
    country:'', city:'', startDate:'', endDate:'', stayName:'',
    segments:[], places:[], schedule:[], checklist:[],
    budget:{total:0,currency:'KRW'}, expenses:[]
  };
}

function saveDB(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
  renderAll();
}
function loadDB(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){ try{ db=JSON.parse(raw); }catch(e){} }
  if(!Array.isArray(db.trips)) db.trips=[];
  db.trips=db.trips.map(t=>({
    segments:[], places:[], schedule:[], checklist:[], budget:{total:0,currency:'KRW'}, expenses:[],
    ...t,
    segments:Array.isArray(t.segments)?t.segments:[],
    places:Array.isArray(t.places)?t.places:[],
    schedule:Array.isArray(t.schedule)?t.schedule:[],
    checklist:Array.isArray(t.checklist)?t.checklist:[],
    expenses:Array.isArray(t.expenses)?t.expenses:[]
  }));
  if(db.trips.length===0){
    const trip=defaultTrip('첫 여행');
    db.trips.push(trip);
    db.currentTripId=trip.id;
  }
  if(!db.currentTripId || !currentTrip()) db.currentTripId=db.trips[0].id;
  renderAll();
}

function createTrip(){
  const name=$('newTripName').value.trim()||`새 여행 ${db.trips.length+1}`;
  const trip=defaultTrip(name);
  db.trips.unshift(trip);
  db.currentTripId=trip.id;
  $('newTripName').value='';
  saveDB();
}
function selectTrip(id){db.currentTripId=id; selectedDate=''; editingChecklistId=null; renderAll();}
function duplicateTrip(){
  const trip=currentTrip(); if(!trip) return;
  const copy=JSON.parse(JSON.stringify(trip));
  copy.id=uid(); copy.archived=false; copy.tripName=(trip.tripName||'여행')+' 복사본';
  db.trips.unshift(copy); db.currentTripId=copy.id; saveDB();
}
function archiveCurrentTrip(){const trip=currentTrip(); if(!trip) return; trip.archived=!trip.archived; saveDB();}
function deleteCurrentTrip(){
  const trip=currentTrip(); if(!trip) return;
  if(!confirm(`"${trip.tripName||'이 여행'}"을 삭제할까요?`)) return;
  db.trips=db.trips.filter(t=>t.id!==trip.id);
  if(!db.trips.length){const t=defaultTrip('첫 여행'); db.trips.push(t); db.currentTripId=t.id;}
  else db.currentTripId=db.trips[0].id;
  saveDB();
}
function toggleArchiveView(){db.showArchive=!db.showArchive; renderTripList();}

function renderTripList(){
  const box=$('tripList'); box.innerHTML='';
  const trips=db.trips.filter(t=>db.showArchive?t.archived:!t.archived);
  if(!trips.length){box.innerHTML='<div class="hint">표시할 여행이 없습니다.</div>'; return;}
  trips.forEach(t=>{
    const seg=(t.segments||[])[0];
    const div=document.createElement('div');
    div.className='trip-item'+(t.id===db.currentTripId?' active':'');
    div.innerHTML=`<b>${esc(t.tripName||'이름 없는 여행')}</b>
      <div class="trip-meta">${esc([t.country,t.city].filter(Boolean).join(' · ') || (seg?[seg.country,seg.city].filter(Boolean).join(' · '):'나라/도시 미입력'))}</div>
      <div class="trip-meta">${esc([t.startDate,t.endDate].filter(Boolean).join(' ~ ') || (seg?[seg.start,seg.end].join(' ~ '):'날짜 미입력'))}</div>`;
    div.onclick=()=>selectTrip(t.id);
    box.appendChild(div);
  });
}

function fillTripForm(){
  const trip=currentTrip(); if(!trip) return;
  $('tripName').value=trip.tripName||'';
  $('companions').value=trip.companions||'';
  $('tripCountry').value=trip.country||'';
  $('tripCity').value=trip.city||'';
  $('startDate').value=trip.startDate||'';
  $('endDate').value=trip.endDate||'';
  $('budgetTotal').value=trip.budget?.total||'';
  $('budgetCurrency').value=trip.budget?.currency||'KRW';
}
function saveTripInfo(){
  const trip=currentTrip(); if(!trip) return;
  trip.tripName=$('tripName').value.trim();
  trip.companions=$('companions').value.trim();
  trip.country=$('tripCountry').value.trim();
  trip.city=$('tripCity').value.trim();
  trip.startDate=$('startDate').value;
  trip.endDate=$('endDate').value;
  const dates=getTimelineDates(trip);
  if(dates.length && (!selectedDate || !dates.includes(selectedDate))) selectedDate=dates[0];
  saveDB();
}
function updateHeader(){
  const trip=currentTrip(); if(!trip) return;
  const firstSeg=(trip.segments||[])[0];
  $('currentTripTitle').textContent=trip.tripName||'이름 없는 여행';
  const parts=[];
  parts.push([trip.country,trip.city].filter(Boolean).join(' · ') || (firstSeg?[firstSeg.country,firstSeg.city].filter(Boolean).join(' · '):'나라/도시 미입력'));
  parts.push([trip.startDate,trip.endDate].filter(Boolean).join(' ~ ') || (firstSeg?[firstSeg.start,firstSeg.end].join(' ~ '):'날짜 미입력'));
  parts.push(trip.archived?'archive 상태':'active 상태');
  $('currentTripMeta').textContent=parts.join(' / ');
}

function setupAutocomplete(inputId, boxId, sourceFn, onPick){
  const input=$(inputId), box=$(boxId);
  function renderSuggestions(){
    const q=input.value.trim();
    const items=sourceFn(q);
    box.innerHTML='';
    if(!items.length){ box.classList.remove('show'); return; }
    items.forEach(item=>{
      const div=document.createElement('div');
      div.className='suggestion';
      if(typeof item==='string') div.textContent=item;
      else div.innerHTML=item.html;
      div.onclick=()=>{
        if(typeof item==='string'){ input.value=item; if(onPick) onPick(item); }
        else { input.value=item.value; if(onPick) onPick(item.raw); }
        box.classList.remove('show');
      };
      box.appendChild(div);
    });
    box.classList.add('show');
  }
  input.addEventListener('input', renderSuggestions);
  input.addEventListener('focus', renderSuggestions);
  input.addEventListener('click', renderSuggestions);
  document.addEventListener('click',e=>{ if(!box.contains(e.target)&&e.target!==input) box.classList.remove('show'); });
}

setupAutocomplete('tripCountry','tripCountrySuggestions',q=>(q?countries.filter(x=>x.includes(q)):countries).slice(0,10));
setupAutocomplete('tripCity','tripCitySuggestions',q=>{
  const country=$('tripCountry').value.trim();
  const pool=cityMap[country]||Object.values(cityMap).flat();
  return (q?pool.filter(x=>x.includes(q)):pool).slice(0,10);
});
setupAutocomplete('segmentCountry','segmentCountrySuggestions',q=>(q?countries.filter(x=>x.includes(q)):countries).slice(0,10));
setupAutocomplete('segmentCity','segmentCitySuggestions',q=>{
  const country=$('segmentCountry').value.trim();
  const pool=cityMap[country]||Object.values(cityMap).flat();
  return (q?pool.filter(x=>x.includes(q)):pool).slice(0,10);
});
setupAutocomplete('searchPlaceInput','placeSuggestions',q=>{
  const trip=currentTrip();
  const baseCountry=trip?.country||'';
  const baseCity=trip?.city||'';
  return placeSeed
    .filter(p=>(!baseCountry||p.country===baseCountry)&&(!baseCity||p.city===baseCity||p.city.includes(baseCity)))
    .filter(p=>p.name.includes(q)||p.address.toLowerCase().includes(q.toLowerCase())||p.city.includes(q))
    .slice(0,12)
    .map(p=>({value:p.name,raw:p,html:`<b>${esc(p.name)}</b><div class="meta">${esc(p.city)} · ${esc(p.category)} · ${esc(p.address)}</div>`}));
},p=>{
  $('searchPlaceInput').value=p.name;
  $('placeAddress').value=p.address;
  $('placeCategory').value=p.category||'관광지';
  $('placeCountry').value=p.country||'';
  $('placeCity').value=p.city||'';
});

function addTravelSegment(){
  const trip=currentTrip(); if(!trip) return;
  trip.segments = Array.isArray(trip.segments) ? trip.segments : [];
  const start=$('segmentStartDate').value;
  const end=$('segmentEndDate').value;
  const country=$('segmentCountry').value.trim();
  const city=$('segmentCity').value.trim();
  const stayName=$('segmentStayName').value.trim();
  const stayAddress=$('segmentStayAddress').value.trim();

  if(!start || !end || !country || !city){
    alert('구간 날짜, 나라, 도시를 입력해 주세요.');
    return;
  }
  if(start > end){
    alert('구간 시작일이 종료일보다 늦을 수 없습니다.');
    return;
  }

  trip.segments.push({id:uid(), start, end, country, city, stayName, stayAddress});
  clearTravelSegmentInputs();

  const dates=getTimelineDates(trip);
  if(dates.length && (!selectedDate || !dates.includes(selectedDate))) selectedDate=dates[0];

  saveDB();
}
function clearTravelSegmentInputs(){
  ['segmentStartDate','segmentEndDate','segmentCountry','segmentCity','segmentStayName','segmentStayAddress'].forEach(id=>$(id).value='');
}
function removeTravelSegment(id){
  const trip=currentTrip(); if(!trip) return;
  trip.segments=(trip.segments||[]).filter(seg=>seg.id!==id);
  saveDB();
}
function renderSegments(){
  const trip=currentTrip();
  const box=$('segmentList');
  box.innerHTML='';
  if(!trip || !(trip.segments||[]).length){
    box.innerHTML='<div class="hint">추가된 여행 구간이 아직 없습니다.</div>';
    return;
  }
  trip.segments.forEach(seg=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<h4>${esc(seg.country)} · ${esc(seg.city)}</h4>
      <div class="meta">${esc(seg.start)} ~ ${esc(seg.end)}</div>
      <div class="meta">${esc(seg.stayName || '숙소 미입력')}</div>
      ${seg.stayAddress?`<div class="meta">${esc(seg.stayAddress)}</div>`:''}
      <div class="mini-actions"><button class="small danger" onclick="removeTravelSegment('${seg.id}')">삭제</button></div>`;
    box.appendChild(div);
  });
}

function addPlace(){
  const trip=currentTrip(); if(!trip) return;
  const name=$('searchPlaceInput').value.trim();
  if(!name){ alert('장소를 입력해 주세요.'); return; }
  trip.places.push({
    id:uid(),
    name,
    category:$('placeCategory').value,
    country:$('placeCountry').value.trim(),
    city:$('placeCity').value.trim(),
    address:$('placeAddress').value.trim(),
    memo:$('placeMemo').value.trim()
  });
  clearPlaceInputs();
  saveDB();
}
function clearPlaceInputs(){
  ['searchPlaceInput','placeCountry','placeCity','placeAddress','placeMemo'].forEach(id=>$(id).value='');
  $('placeCategory').value='관광지';
}
function removePlace(id){
  const trip=currentTrip(); if(!trip) return;
  trip.places=(trip.places||[]).filter(p=>p.id!==id);
  trip.schedule=(trip.schedule||[]).filter(s=>s.placeId!==id);
  saveDB();
}
function renderPlaces(){
  const trip=currentTrip(); const box=$('placeList'); box.innerHTML='';
  if(!trip || !(trip.places||[]).length){ box.innerHTML='<div class="hint">아직 등록된 장소가 없습니다.</div>'; return; }
  trip.places.forEach(p=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<h4>${esc(p.name)}</h4>
      <div class="meta">${esc([p.category,p.country,p.city].filter(Boolean).join(' · '))}</div>
      ${p.address?`<div style="margin-top:6px">${esc(p.address)}</div>`:''}
      ${p.memo?`<div class="meta" style="margin-top:6px">${esc(p.memo)}</div>`:''}
      <div class="mini-actions"><button class="ghost small" onclick="removePlace('${p.id}')">삭제</button></div>`;
    box.appendChild(div);
  });
}

function getDateRange(start,end){
  if(!start || !end) return [];
  const s=new Date(start+'T00:00:00'), e=new Date(end+'T00:00:00');
  if(isNaN(s)||isNaN(e)||s>e) return [];
  const dates=[]; const cur=new Date(s);
  while(cur<=e){ dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  return dates;
}
function getTimelineDates(trip){
  if(!trip) return [];
  let dates=[];
  if(trip.startDate && trip.endDate) dates.push(...getDateRange(trip.startDate, trip.endDate));
  (trip.segments||[]).forEach(seg=>{ if(seg.start && seg.end) dates.push(...getDateRange(seg.start, seg.end)); });
  return [...new Set(dates)].sort();
}
function getActiveSegmentsForDate(trip, date){
  if(!trip || !date) return [];
  return (trip.segments||[]).filter(seg=>seg.start<=date && seg.end>=date);
}
function renderDateTabs(){
  const trip=currentTrip(); const box=$('dateTabs'); box.innerHTML='';
  const dates=getTimelineDates(trip);
  if(!dates.length){
    $('selectedDateLabel').textContent='여행 날짜나 구간 날짜를 설정하면 일정표가 나타납니다.';
    return;
  }
  if(!selectedDate || !dates.includes(selectedDate)) selectedDate=dates[0];
  dates.forEach(d=>{
    const segs=getActiveSegmentsForDate(trip,d);
    const label=segs.length ? `${d} · ${segs.map(s=>[s.country,s.city].filter(Boolean).join('/')).join(', ')}` : d;
    const b=document.createElement('button');
    b.className='date-pill'+(d===selectedDate?' active':'');
    b.textContent=label;
    b.onclick=()=>{ selectedDate=d; renderDateTabs(); renderTimelineSegmentStatus(); renderSchedule(); renderAssignPlaceSelect(); };
    box.appendChild(b);
  });
  $('selectedDateLabel').textContent=`${selectedDate} 일정`;
}
function renderTimelineSegmentStatus(){
  const trip=currentTrip(); const box=$('timelineSegmentBox'); box.innerHTML='';
  const dates=getTimelineDates(trip);
  if(!dates.length || !selectedDate){
    box.innerHTML='<div class="hint">구간을 추가하면 선택한 날짜에 어느 나라/도시에 있는지 여기에 표시됩니다.</div>';
    return;
  }
  const segs=getActiveSegmentsForDate(trip, selectedDate);
  if(!segs.length){
    box.innerHTML='<div class="item"><h4>선택한 날짜의 여행 구간</h4><div class="meta">이 날짜에 연결된 여행 구간이 아직 없습니다.</div></div>';
    return;
  }
  segs.forEach(seg=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<h4>${esc(seg.country)} · ${esc(seg.city)}</h4>
      <div class="meta">${esc(seg.start)} ~ ${esc(seg.end)}</div>
      <div class="meta">${esc(seg.stayName || '숙소 미입력')}</div>
      ${seg.stayAddress?`<div class="meta">${esc(seg.stayAddress)}</div>`:''}`;
    box.appendChild(div);
  });
}
function renderAssignPlaceSelect(){
  const trip=currentTrip(); const sel=$('assignPlaceSelect'); sel.innerHTML='';
  if(!trip || !(trip.places||[]).length){ sel.innerHTML='<option value="">등록된 장소 없음</option>'; return; }
  trip.places.forEach(p=>{
    const opt=document.createElement('option');
    opt.value=p.id;
    opt.textContent=[p.name,p.city].filter(Boolean).join(' · ');
    sel.appendChild(opt);
  });
}
function assignPlaceToDate(){
  const trip=currentTrip(); if(!trip) return;
  const placeId=$('assignPlaceSelect').value;
  if(!placeId){ alert('등록된 장소가 없습니다.'); return; }
  const exists=(trip.schedule||[]).find(x=>x.date===selectedDate && x.placeId===placeId);
  if(exists){ alert('이미 이 날짜에 들어간 장소입니다.'); return; }
  trip.schedule.push({id:uid(), date:selectedDate, placeId, time:$('assignTime').value, note:$('assignNote').value.trim()});
  $('assignNote').value='';
  saveDB();
}
function removeSchedule(id){
  const trip=currentTrip(); if(!trip) return;
  trip.schedule=(trip.schedule||[]).filter(s=>s.id!==id);
  saveDB();
}
function renderSchedule(){
  const trip=currentTrip(); const box=$('datedPlaceList'); box.innerHTML='';
  const dates=getTimelineDates(trip);
  if(!dates.length){
    box.innerHTML='<div class="hint">먼저 여행 날짜나 구간 날짜를 입력해 주세요.</div>';
    return;
  }
  const items=(trip.schedule||[]).filter(s=>s.date===selectedDate);
  if(!items.length){
    const segs=getActiveSegmentsForDate(trip, selectedDate);
    box.innerHTML=`<div class="hint">이 날짜에는 아직 장소가 없습니다.${segs.length ? ' 현재 여행 구간은 위에 표시됩니다.' : ''}</div>`;
    return;
  }
  items.forEach(s=>{
    const place=(trip.places||[]).find(p=>p.id===s.placeId);
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<h4>${esc(place?.name||'장소 없음')}</h4>
      <div class="meta">${esc([place?.category,s.time].filter(Boolean).join(' · '))}</div>
      ${place?.address?`<div style="margin-top:6px">${esc(place.address)}</div>`:''}
      ${s.note?`<div class="meta" style="margin-top:6px">${esc(s.note)}</div>`:''}
      <div class="mini-actions"><button class="ghost small" onclick="removeSchedule('${s.id}')">삭제</button></div>`;
    box.appendChild(div);
  });
}

function quickLoadChecklist(key){
  const trip=currentTrip(); if(!trip) return;
  checklistTemplates[key].forEach(([title,detail])=>trip.checklist.push({id:uid(),title,detail,done:false}));
  saveDB();
}
function addChecklist(){
  const trip=currentTrip(); if(!trip) return;
  const title=$('checkTitle').value.trim(); if(!title){ alert('체크리스트 제목을 입력해 주세요.'); return; }
  trip.checklist.push({id:uid(), title, detail:$('checkDetail').value.trim(), done:false});
  $('checkTitle').value=''; $('checkDetail').value='';
  saveDB();
}
function toggleChecklist(id){
  const trip=currentTrip(); const item=(trip.checklist||[]).find(x=>x.id===id);
  if(item) item.done=!item.done;
  saveDB();
}
function renderChecklist(){
  const trip=currentTrip(); const box=$('checkList'); box.innerHTML='';
  if(!trip || !(trip.checklist||[]).length){ box.innerHTML='<div class="hint">체크리스트가 아직 없습니다.</div>'; return; }
  trip.checklist.forEach(c=>{
    const div=document.createElement('div');
    div.className='check-card';
    div.innerHTML=`<input type="checkbox" ${c.done?'checked':''} onchange="toggleChecklist('${c.id}')"><div><div class="${c.done?'done':''}" style="font-weight:800">${esc(c.title)}</div>${c.detail?`<div class="meta ${c.done?'done':''}" style="margin-top:4px">${esc(c.detail)}</div>`:''}</div><div></div>`;
    box.appendChild(div);
  });
}

function saveBudget(){
  const trip=currentTrip(); if(!trip) return;
  trip.budget={total:Number($('budgetTotal').value||0), currency:$('budgetCurrency').value};
  saveDB();
}

function renderTripInfoCards(){
  const trip=currentTrip(); const box=$('tripInfoCards'); box.innerHTML='';
  if(!trip) return;
  const firstSeg=(trip.segments||[])[0];
  const cards=[
    {title:'대표 여행 정보', text:[trip.country,trip.city].filter(Boolean).join(' · ') || (firstSeg?[firstSeg.country,firstSeg.city].filter(Boolean).join(' · '):'나라/도시 미입력')},
    {title:'여행 기간', text:[trip.startDate,trip.endDate].filter(Boolean).join(' ~ ') || (firstSeg?[firstSeg.start,firstSeg.end].join(' ~ '):'기간 미입력')},
    {title:'동행', text:trip.companions || '미입력'},
    {title:'대표 숙소', text:trip.stayName || firstSeg?.stayName || '미입력'}
  ];
  cards.forEach(c=>{
    const div=document.createElement('div');
    div.className='item';
    div.innerHTML=`<h4>${esc(c.title)}</h4><div class="meta">${esc(c.text)}</div>`;
    box.appendChild(div);
  });
}
function updateKPIs(){
  const trip=currentTrip(); if(!trip) return;
  $('kpiPlaces').textContent=money((trip.places||[]).length);
  $('kpiSegments').textContent=money((trip.segments||[]).length);
  $('kpiChecklist').textContent=money((trip.checklist||[]).length);
  $('kpiBudget').textContent=money(trip.budget?.total||0);
}
function switchTab(name, btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
  $('panel-'+name).classList.add('active');
}
function renderAll(){
  renderTripList();
  fillTripForm();
  updateHeader();
  renderSegments();
  renderTripInfoCards();
  renderPlaces();
  renderDateTabs();
  renderTimelineSegmentStatus();
  renderAssignPlaceSelect();
  renderSchedule();
  renderChecklist();
  updateKPIs();
}

loadDB();
</script>
